<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepSeeker AI (GPT Real-Time)</title><style>
:root{--bg:#000;--green:#00ff88;--glass:rgba(0,255,136,0.1);--cyan:#00eaff}
body{margin:0;font-family:sans-serif;background:var(--bg);color:#fff}

#loginPage{display:flex;justify-content:center;align-items:center;height:100vh}
.login-box{background:var(--glass);padding:20px;border-radius:15px;backdrop-filter:blur(10px);box-shadow:0 0 20px var(--green)}
input,button,select{padding:10px;border:none;border-radius:10px;margin-top:10px}
button{background:var(--green);cursor:pointer}

#app{display:none;height:100vh;flex-direction:column}
header{display:flex;align-items:center;gap:10px;padding:10px;background:#111}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--green)}
.clock{color:var(--green);text-shadow:0 0 10px var(--green)}
.expire{color:var(--cyan)}

.chat-box{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column}
.msg{padding:10px;margin:5px;border-radius:10px;max-width:75%}
.user{align-self:flex-end;background:#222}
.ai{align-self:flex-start;background:#0f172a;color:#00ff88;text-shadow:0 0 8px #00ff88}

.input-area{display:flex;gap:5px;padding:10px;background:#111}
textarea{flex:1;border-radius:20px;padding:10px;background:#222;color:#fff}

</style></head>
<body><div id="loginPage">
<div class="login-box">
<h2>Login Token</h2>
<select id="expiry">
<option value="1">1 Hari</option>
<option value="5">5 Hari</option>
<option value="7">7 Hari</option>
</select>
<input id="tokenInput">
<button onclick="login()">Masuk</button>
<button onclick="generateToken()">Generate</button>
<div id="generated"></div>
<p id="status"></p>
</div>
</div><div id="app">
<header>
<div class="avatar"></div>
<b>DeepSeeker GPT</b>
<div class="clock" id="clock"></div>
<div class="expire" id="expireInfo"></div>
</header><div class="chat-box" id="chat"></div><div class="input-area">
<textarea id="input"></textarea>
<button onclick="send()">➤</button>
</div>
</div><script>
// TOKEN
function getTokens(){return JSON.parse(localStorage.getItem("tokens")||"{}");}
function saveTokens(t){localStorage.setItem("tokens",JSON.stringify(t));}

function generateToken(){
let t="TK"+Math.random().toString(36).substring(2,10);
let days=parseInt(document.getElementById("expiry").value);
let expire=Date.now()+days*86400000;
let tokens=getTokens();
tokens[t]={expire};
saveTokens(tokens);
document.getElementById("generated").innerText="Token: "+t;
navigator.clipboard.writeText(t);
}

function login(){
let t=document.getElementById("tokenInput").value.trim();
let tokens=getTokens();
if(Object.keys(tokens).length===0){generateToken();tokens=getTokens();}
let data=tokens[t];
if(data && data.expire>Date.now()){
localStorage.setItem("activeToken",t);
location.reload();
}else{document.getElementById("status").innerText="Token invalid"}
}

// AUTO LOGIN
let active=localStorage.getItem("activeToken");
let tokens=getTokens();
if(active && tokens[active] && tokens[active].expire>Date.now()){
document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="flex";
startExpire(tokens[active].expire);
}

// CLOCK
setInterval(()=>{clock.innerText=new Date().toLocaleTimeString()},1000);

function startExpire(exp){
setInterval(()=>{
let s=Math.floor((exp-Date.now())/1000);
if(s<=0){localStorage.removeItem("activeToken");location.reload();}
let d=Math.floor(s/86400);
let h=Math.floor((s%86400)/3600);
let m=Math.floor((s%3600)/60);
expireInfo.innerText=`${d}d ${h}h ${m}m`;
},1000);
}

// CHAT
function add(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=999999;
return div;
}

async function send(){
let input=document.getElementById("input");
let text=input.value.trim();
if(!text)return;

add(text,"user");
input.value="";

// streaming bubble
let bubble=add("","ai");

const response=await fetch("https://api.openai.com/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer API_KEY_OPENAI"
},
body:JSON.stringify({
model:"gpt-4o-mini",
messages:[{role:"user",content:text}],
stream:true
})
});

const reader=response.body.getReader();
const decoder=new TextDecoder("utf-8");

while(true){
const {done,value}=await reader.read();
if(done) break;

let chunk=decoder.decode(value);
let lines=chunk.split("\n");

for(let line of lines){
if(line.startsWith("data: ")){
let json=line.replace("data: ","");
if(json==="[DONE]") return;
try{
let data=JSON.parse(json);
let content=data.choices?.[0]?.delta?.content;
if(content) bubble.innerText+=content;
}catch{}
}
}
}
}
</script></body>
</html>
