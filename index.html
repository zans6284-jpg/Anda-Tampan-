<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepSeeker AI Hybrid Mode</title><style>
:root{--bg:#000;--green:#00ff88}
body{margin:0;font-family:sans-serif;background:var(--bg);color:#fff}
#app{display:flex;height:100vh;flex-direction:column}
header{padding:10px;background:#111}
.chat-box{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column}
.msg{padding:10px;margin:5px;border-radius:10px;max-width:75%;white-space:pre-wrap;position:relative}
.user{align-self:flex-end;background:#222}
.ai{align-self:flex-start;background:#0f172a;color:var(--green)}
.input-area{display:flex;flex-direction:column;padding:10px;background:#111;gap:8px}
textarea,input{border-radius:20px;padding:12px;background:#222;color:#fff;border:none;width:100%}
button{padding:10px;border:none;border-radius:10px;background:var(--green)}

/* FLOAT MENU (IMPROVED MODERN) */
.menu{
position:absolute;
top:-45px;
right:0;
background:#111;
border-radius:12px;
padding:6px;
display:none;
box-shadow:0 0 15px rgba(0,0,0,0.8);
backdrop-filter:blur(8px);
animation:fadeIn 0.15s ease;
}
.menu button{
background:#222;
color:#fff;
padding:6px 10px;
margin:2px;
font-size:12px;
border-radius:8px;
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(5px)}
to{opacity:1;transform:translateY(0)}
}
.menu button{
background:#222;
color:#fff;
padding:5px 10px;
margin:2px;
font-size:12px;
}
</style></head>
<body><div id="app">
<header>
<b>DeepSeeker HYBRID MODE</b>
<input id="apiKey" placeholder="API Key (opsional untuk AI)">
</header><div class="chat-box" id="chat"></div><div class="input-area">
<textarea id="input" placeholder="Tanya apa saja..."></textarea>
<button onclick="send()">Kirim</button>
</div>
</div><script>
let messages=[];

function add(text,type){
let div=document.createElement("div");
div.className="msg "+type;

let textEl=document.createElement("span");
textEl.innerText=text;

let menu=document.createElement("div");
menu.className="menu";

let edit=document.createElement("button");
edit.innerText="Edit";

let del=document.createElement("button");
del.innerText="Delete";

menu.appendChild(edit);
menu.appendChild(del);

div.appendChild(textEl);
div.appendChild(menu);

// LONG PRESS MOBILE (MODERN FIX)
let timer;
div.addEventListener("touchstart",()=>{
timer=setTimeout(()=>{
document.querySelectorAll('.menu').forEach(m=>m.style.display='none');
menu.style.display="block";
},350);
});

div.addEventListener("touchend",()=>clearTimeout(timer));

// DESKTOP RIGHT CLICK
div.addEventListener("contextmenu",(e)=>{
e.preventDefault();
document.querySelectorAll('.menu').forEach(m=>m.style.display='none');
menu.style.display="block";
});

// TAP OUTSIDE TO CLOSE
window.addEventListener("click",()=>{
document.querySelectorAll('.menu').forEach(m=>m.style.display='none');
});

chat.appendChild(div);
chat.scrollTop=999999;

messages.push({role:type,text});
let index=messages.length-1;

// DELETE
del.onclick=()=>{
messages.splice(index,1);
render();
};

// EDIT
edit.onclick=()=>{
let newText=prompt("Edit pesan",textEl.innerText);
if(newText!==null){
messages[index].text=newText;
render();
}
};

return textEl;
}

function render(){
chat.innerHTML="";
let temp=[...messages];
messages=[];
temp.forEach(m=>add(m.text,m.role));
}

function stream(el,text){
el.innerText="";
let i=0;
let t=setInterval(()=>{
if(i<text.length){el.innerText+=text[i++]}
else clearInterval(t)
},8);
}

// SEARCH + REALTIME NEWS
async function searchFull(query){
let result="";
try{

// DuckDuckGo
let d=await fetch(`https://api.duckduckgo.com/?q=${encodeURIComponent(query)}&format=json&no_html=1`);
let dj=await d.json();
if(dj.Abstract) result += "[Info]
"+dj.Abstract+"

";

// Wikipedia
let w=await fetch(`https://id.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(query)}`);
let wj=await w.json();
if(wj.extract) result += "[Wiki]
"+wj.extract+"

";

// GOOGLE NEWS (REALTIME STRONGER)
let n=await fetch(`https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss/search?q=${encodeURIComponent(query)}&hl=id&gl=ID&ceid=ID:id`);
let nj=await n.json();

if(nj.items && nj.items.length>0){
result += "[Berita Terbaru REAL-TIME]
";
nj.items.slice(0,5).forEach(item=>{
result += "- "+item.title+"
";
});
}

return result || "Tidak ditemukan info kuat";
}catch{
return "Gagal ambil data web";
}
}

// HYBRID AI
async function send(){
let text=input.value.trim();
if(!text)return;

add(text,"user");
input.value="";

let bubble=add("","ai");

let apiKey=document.getElementById("apiKey").value.trim();
let web=await searchFull(text);

if(!apiKey){
stream(bubble,"[WEB]\n"+web);
return;
}

try{
let res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+apiKey
},
body:JSON.stringify({
model:"openai/gpt-3.5-turbo",
messages:[
{role:"system",content:"Gunakan info web terbaru."},
{role:"user",content:`Pertanyaan: ${text}\n\nData web:\n${web}`}
]
})
});

let data=await res.json();
let reply=data?.choices?.[0]?.message?.content || web;

stream(bubble,reply);

}catch{
stream(bubble,"[WEB]\n"+web);
}
}
</script></body>
</html>
