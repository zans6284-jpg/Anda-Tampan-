<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepSeeker AI</title>
<style>
:root{--bg:#000;--green:#00ff88;--glass:rgba(0,255,136,0.15)}
body{margin:0;font-family:sans-serif;background:var(--bg);color:#fff}
#loginPage{display:flex;justify-content:center;align-items:center;height:100vh}
.login-box{background:var(--glass);padding:20px;border-radius:15px;backdrop-filter:blur(10px);box-shadow:0 0 20px var(--green)}
input,button,select{padding:10px;border:none;border-radius:10px;margin-top:10px}
button{background:var(--green);cursor:pointer}
#app{display:none;height:100vh;flex-direction:column}
header{display:flex;justify-content:space-between;padding:10px;background:var(--glass)}
.clock{color:var(--green);text-shadow:0 0 10px var(--green),0 0 30px var(--green)}
.chat-box{flex:1;overflow:auto;padding:10px}
.msg{padding:10px;margin:10px;border-radius:10px;max-width:80%}
.user{background:#222}
.ai{background:#0f172a;color:#00ffcc}
.input-area{display:flex;padding:10px;background:var(--glass)}
textarea{flex:1;border-radius:10px;padding:10px;background:#111;color:#fff}
pre{background:#111;color:#0f0;padding:10px;border-radius:10px}
.token-display{color:var(--green);word-break:break-all;margin-top:10px}
</style>
</head>
<body><div id="loginPage">
<div class="login-box">
<h2>DeepSeeker Login</h2>
<select id="expiry">
<option value="1">1 Hari</option>
<option value="5">5 Hari</option>
<option value="7">7 Hari</option>
</select>
<input id="tokenInput" placeholder="Masukkan token">
<button onclick="login()">Masuk</button>
<button onclick="generateToken()">Generate Token</button>
<div id="generated" class="token-display"></div>
<p id="status"></p>
</div>
</div><div id="app">
<header>
<h3>DeepSeeker AI</h3>
<div class="clock" id="clock"></div>
<div id="expireInfo"></div>
</header>
<div class="chat-box" id="chat"></div>
<div class="input-area">
<textarea id="input"></textarea>
<button onclick="send()">Kirim</button>
</div>
</div><script>
// ===== TOKEN SYSTEM =====
function getTokens(){
return JSON.parse(localStorage.getItem("tokens")||"{}");
}
function saveTokens(t){
localStorage.setItem("tokens",JSON.stringify(t));
}

function generateToken(){
let tokens=getTokens();
let t="TK"+Math.random().toString(36).substring(2,10);
let days=parseInt(document.getElementById("expiry").value);
let expire=Date.now()+days*86400000;

tokens[t]={expire};
saveTokens(tokens);

// tampilkan + copy
let el=document.getElementById("generated");
el.innerText="Token: "+t;
navigator.clipboard.writeText(t);
}

function login(){
let t=document.getElementById("tokenInput").value.trim();
let tokens=getTokens();

// auto buat jika kosong
if(Object.keys(tokens).length===0){
generateToken();
tokens=getTokens();
}

let data=tokens[t];
if(data && data.expire>Date.now()){
localStorage.setItem("activeToken",t);
location.reload();
}else{
document.getElementById("status").innerText="Token invalid / expired";
}
}

// ===== AUTO LOGIN =====
let active=localStorage.getItem("activeToken");
let tokens=getTokens();
if(active && tokens[active] && tokens[active].expire>Date.now()){
document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="flex";
startExpireTimer(tokens[active].expire);
}

// ===== CLOCK =====
setInterval(()=>{
document.getElementById("clock").innerText=new Date().toLocaleTimeString();
},1000);

// ===== EXPIRE TIMER =====
function startExpireTimer(exp){
setInterval(()=>{
let s=Math.floor((exp-Date.now())/1000);
if(s<=0){
localStorage.removeItem("activeToken");
location.reload();
}
let h=Math.floor(s/3600);
let m=Math.floor((s%3600)/60);
let d=Math.floor(h/24);
document.getElementById("expireInfo").innerText=`Expire: ${d}d ${h%24}h ${m}m`;
},1000);
}

// ===== AI =====
async function callAI(text){
let res=await fetch("https://api.deepseek.com/v1/chat/completions",{
method:"POST",
headers:{"Content-Type":"application/json","Authorization":"sk-c4b0b18c43724726aee04387e11ab428"},
body:JSON.stringify({model:"deepseek-chat",messages:[{role:"user",content:text}]})
});
let d=await res.json();
return d?.choices?.[0]?.message?.content||"Error";
}

async function send(){
let input=document.getElementById("input");
let text=input.value;
if(!text)return;
add(text,"user");
input.value="";
add(await callAI(text),"ai");
}

function add(t,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=t;
document.getElementById("chat").appendChild(div);
}
</script></body>
</html>
