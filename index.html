<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepSeeker AI Multi User</title><style>
:root{--bg:#000;--green:#00ff88;--cyan:#00eaff;--red:#ff3b3b}
body{margin:0;font-family:sans-serif;background:var(--bg);color:#fff}

#loginPage{display:flex;justify-content:center;align-items:center;height:100vh}
.login-box{background:#111;padding:20px;border-radius:15px;box-shadow:0 0 20px var(--green)}

input,button,select{padding:10px;border:none;border-radius:10px;margin-top:10px;width:100%}
button{background:var(--green);cursor:pointer}

#app{display:none;height:100vh;flex-direction:column}
header{display:flex;align-items:center;padding:10px;background:#111}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--green)}
.clock{color:var(--green);margin-left:10px}
.expire{color:var(--cyan);margin-left:10px}
.logout{margin-left:auto;background:var(--red);padding:8px;border-radius:10px;box-shadow:0 0 10px var(--red)}

.chat-box{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column}
.msg{padding:10px;margin:5px;border-radius:10px;max-width:75%}
.user{align-self:flex-end;background:#222}
.ai{align-self:flex-start;background:#0f172a;color:#00ff88;text-shadow:0 0 8px #00ff88}

.input-area{display:flex;padding:10px;background:#111}
textarea{flex:1;border-radius:20px;padding:10px;background:#222;color:#fff;border:none}
</style></head>
<body><!-- LOGIN --><div id="loginPage">
<div class="login-box">
<h3>DeepSeeker Login</h3><select id="expiry">
<option value="1">1 Hari</option>
<option value="5">5 Hari</option>
<option value="7">7 Hari</option>
</select><input id="tokenInput" placeholder="Token user">
<button onclick="generateToken()">Generate Token</button>
<button onclick="login()">Masuk</button><hr>
<h4>API Key</h4>
<input id="apiKeyInput" placeholder="Masukkan API Key OpenRouter">
<button onclick="saveApiKey()">Simpan API Key</button><p id="generated"></p>
<p id="status"></p>
</div>
</div><!-- APP --><div id="app">
<header>
<div class="avatar"></div>
<b style="margin-left:10px">DeepSeeker Multi</b>
<div class="clock" id="clock"></div>
<div class="expire" id="expire"></div>
<button class="logout" onclick="logout()">Logout</button>
</header><div class="chat-box" id="chat"></div><div class="input-area">
<textarea id="input" placeholder="Ketik pesan..."></textarea>
<button onclick="send()">➤</button>
</div>
</div><script>
// ===== TOKEN MULTI USER =====
function getTokens(){return JSON.parse(localStorage.getItem("tokens")||"{}");}
function saveTokens(t){localStorage.setItem("tokens",JSON.stringify(t));}

function generateToken(){
let tokens=getTokens();
let t="USR"+Math.random().toString(36).substring(2,8);
let days=parseInt(document.getElementById("expiry").value);
let expire=Date.now()+days*86400000;

tokens[t]={expire};
saveTokens(tokens);

document.getElementById("generated").innerText="Token: "+t;
document.getElementById("tokenInput").value=t;
}

function login(){
let t=document.getElementById("tokenInput").value.trim();
let tokens=getTokens();

if(!t){
document.getElementById("status").innerText="Isi token dulu";
return;
}

let data=tokens[t];

if(data && data.expire>Date.now()){
localStorage.setItem("activeToken",t);
location.reload();
}else{
document.getElementById("status").innerText="Token invalid / expired";
}
}

function logout(){
localStorage.removeItem("activeToken");
location.reload();
}

// ===== API KEY SAVE =====
function saveApiKey(){
let key=document.getElementById("apiKeyInput").value.trim();
if(!key) return alert("Isi API Key!");
localStorage.setItem("apiKey",key);
alert("API Key tersimpan!");
}

function getApiKey(){
return localStorage.getItem("apiKey");
}

// AUTO LOGIN
(function(){
let t=localStorage.getItem("activeToken");
let tokens=getTokens();

if(t && tokens[t] && tokens[t].expire>Date.now()){
loginPage.style.display="none";
app.style.display="flex";
startExpire(tokens[t].expire);
}
})();

// CLOCK
setInterval(()=>{
clock.innerText=new Date().toLocaleTimeString();
},1000);

function startExpire(exp){
setInterval(()=>{
let s=Math.floor((exp-Date.now())/1000);
if(s<=0){localStorage.removeItem("activeToken");location.reload();}
let d=Math.floor(s/86400);
let h=Math.floor((s%86400)/3600);
let m=Math.floor((s%3600)/60);
expire.innerText=`${d}d ${h}h ${m}m`;
},1000);
}

// CHAT
function add(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=999999;
return div;
}

function streamText(el,text){
let i=0;
let int=setInterval(()=>{
if(i<text.length){el.innerText+=text[i];i++;}
else clearInterval(int);
},10);
}

// AI MULTI USER + API KEY
async function send(){
let apiKey=getApiKey();
if(!apiKey){alert("Masukkan API Key dulu!");return;}

let input=document.getElementById("input");
let text=input.value.trim();
if(!text)return;

add(text,"user");
input.value="";

let bubble=add("","ai");

try{
let res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+apiKey
},
body:JSON.stringify({
model:"openai/gpt-3.5-turbo",
messages:[
{role:"system",content:"AI chat untuk coding, cerita, RP, dll."},
{role:"user",content:text}
]
})
});

let data=await res.json();
let reply=data?.choices?.[0]?.message?.content || "Tidak ada respon";

streamText(bubble,reply);

}catch{
bubble.innerText="Error koneksi";
}
}
</script></body>
</html>
