<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Access</title>

<style>
body {
    background: black;
    color: lime;
    font-family: monospace;
    text-align: center;
    padding-top: 80px;
    transition: background 0.1s;
}

input, button {
    padding: 12px;
    font-size: 18px;
    margin: 5px;
}

#countdown {
    font-size: 80px;
    margin-top: 30px;
}

#pertanyaan {
    display: none;
    margin-top: 30px;
}

.btn {
    display: inline-block;
    border: 2px solid lime;
    padding: 15px 40px;
    margin: 10px;
    cursor: pointer;
}

#horrorText {
    display: none;
    font-size: 30px;
    margin-top: 30px;
    color: #00ff00;
}
</style>
</head>
<body>

<h1>🔒 SYSTEM VERIFY</h1>
<p>ENTER PASSWORD</p>

<input type="password" id="password">
<br>
<button onclick="cekPassword()">ACCESS</button>

<div id="countdown"></div>

<div id="pertanyaan">
    <h2>Orang bodoh selalu berkata tidak.<br>Jadi apakah anda bodoh?</h2>
    
    <div class="btn" onclick="mulaiHorror()">YA</div>
    <div class="btn" onclick="mulaiHorror()">TIDAK</div>
</div>

<div id="horrorText"> * ```DATA ANDA``` DIREKAM</div>

<audio id="sound" src="sound.mp3"></audio>

<script>
function cekPassword() {
    const input = document.getElementById("password").value;

    if (input === "Akuganteng") {
        mulaiCountdown();
    } else {
        alert("ACCESS DENIED");
    }
}

function mulaiCountdown() {
    let waktu = 4;
    const tampil = document.getElementById("countdown");

    tampil.innerHTML = waktu;

    let interval = setInterval(() => {
        waktu--;
        tampil.innerHTML = waktu;

        if (waktu === 0) {
            clearInterval(interval);
            tampil.innerHTML = "";
            document.getElementById("pertanyaan").style.display = "block";
        }
    }, 1000);
}

function mulaiHorror() {
    let audio = document.getElementById("sound");
    audio.volume = 1.0;
    audio.play();

    document.getElementById("horrorText").style.display = "block";

    // Efek kedip hijau
    let nyala = false;
    setInterval(() => {
        document.body.style.background = nyala ? "black" : "#00ff00";
        nyala = !nyala;
    }, 100);
}
</script>

</body>
</html>
