<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepSeeker AI (Gemini Stable)</title><style>
:root{--bg:#000;--green:#00ff88;--glass:rgba(0,255,136,0.1);--cyan:#00eaff;--red:#ff3b3b}
body{margin:0;font-family:sans-serif;background:var(--bg);color:#fff}

#loginPage{display:flex;justify-content:center;align-items:center;height:100vh}
.login-box{background:var(--glass);padding:20px;border-radius:15px;backdrop-filter:blur(10px);box-shadow:0 0 20px var(--green)}
input,button,select{padding:10px;border:none;border-radius:10px;margin-top:10px}
button{background:var(--green);cursor:pointer}

#app{display:none;height:100vh;flex-direction:column}
header{display:flex;align-items:center;gap:10px;padding:10px;background:#111}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--green)}
.clock{color:var(--green);text-shadow:0 0 10px var(--green)}
.expire{color:var(--cyan)}
.logout{margin-left:auto;background:var(--red);border-radius:12px;color:#fff;box-shadow:0 0 10px var(--red),0 0 25px var(--red);padding:8px 12px}

.chat-box{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column}
.msg{padding:10px;margin:5px;border-radius:10px;max-width:75%;word-break:break-word}
.user{align-self:flex-end;background:#222}
.ai{align-self:flex-start;background:#0f172a;color:#00ff88;text-shadow:0 0 8px #00ff88}

.input-area{display:flex;gap:5px;padding:10px;background:#111}
textarea{flex:1;border-radius:20px;padding:10px;background:#222;color:#fff}
</style></head>
<body><div id="loginPage">
<div class="login-box">
<h2>Login Token</h2>
<select id="expiry">
<option value="1">1 Hari</option>
<option value="5">5 Hari</option>
<option value="7">7 Hari</option>
</select>
<input id="tokenInput" placeholder="Masukkan token">
<button onclick="login()">Masuk</button>
<button onclick="generateToken()">Generate</button>
<div id="generated"></div>
<p id="status"></p>
</div>
</div><div id="app">
<header>
<div class="avatar"></div>
<b>DeepSeeker Gemini</b>
<div class="clock" id="clock"></div>
<div class="expire" id="expireInfo"></div>
<button class="logout" onclick="logout()">Logout</button>
</header><div class="chat-box" id="chat"></div><div class="input-area">
<textarea id="input" placeholder="Ketik pesan..."></textarea>
<button onclick="send()">➤</button>
</div>
</div><script>
// SAFE DOM
const clockEl = document.getElementById("clock");
const expireEl = document.getElementById("expireInfo");
const chatEl = document.getElementById("chat");

// TOKEN
function getTokens(){return JSON.parse(localStorage.getItem("tokens")||"{}");}
function saveTokens(t){localStorage.setItem("tokens",JSON.stringify(t));}

function generateToken(){
let t="TK"+Math.random().toString(36).substring(2,10);
let days=parseInt(document.getElementById("expiry").value);
let expire=Date.now()+days*86400000;
let tokens=getTokens();
tokens[t]={expire};
saveTokens(tokens);
document.getElementById("generated").innerText="Token: "+t;
navigator.clipboard.writeText(t);
}

function login(){
let t=document.getElementById("tokenInput").value.trim();
let tokens=getTokens();
if(Object.keys(tokens).length===0){generateToken();tokens=getTokens();}
let data=tokens[t];
if(data && data.expire>Date.now()){
localStorage.setItem("activeToken",t);
location.reload();
}else{document.getElementById("status").innerText="Token invalid / expired"}
}

function logout(){
localStorage.removeItem("activeToken");
location.reload();
}

// AUTO LOGIN
let active=localStorage.getItem("activeToken");
let tokens=getTokens();
if(active && tokens[active] && tokens[active].expire>Date.now()){
document.getElementById("loginPage").style.display="none";
document.getElementById("app").style.display="flex";
startExpire(tokens[active].expire);
}

// CLOCK
setInterval(()=>{
clockEl.innerText=new Date().toLocaleTimeString();
},1000);

function startExpire(exp){
setInterval(()=>{
let s=Math.floor((exp-Date.now())/1000);
if(s<=0){localStorage.removeItem("activeToken");location.reload();}
let d=Math.floor(s/86400);
let h=Math.floor((s%86400)/3600);
let m=Math.floor((s%3600)/60);
expireEl.innerText=`${d}d ${h}h ${m}m`;
},1000);
}

// CHAT UI
function add(text,type){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chatEl.appendChild(div);
chatEl.scrollTop=chatEl.scrollHeight;
return div;
}

// GEMINI (REAL RESPONSE, NO STREAM)
async function send(){
let input=document.getElementById("input");
let text=input.value.trim();
if(!text) return;

add(text,"user");
input.value="";

let bubble=add("...","ai");

try{
let res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=AIzaSyCoB-byCEYCsPVD8tH6RLBrt4cF-kZaTHk",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
contents:[{parts:[{text:text}]}]
})
});

if(!res.ok){
bubble.innerText="Error API: "+res.status;
return;
}

let data=await res.json();
let reply=data?.candidates?.[0]?.content?.parts?.[0]?.text;

bubble.innerText = reply || "Tidak ada respon";

}catch(e){
bubble.innerText="Error koneksi";
}
}

</script></body>
</html>
