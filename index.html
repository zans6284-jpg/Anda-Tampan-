<!DOCTYPE html><html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepSeeker AI Multi User</title><style>
:root{--bg:#000;--green:#00ff88;--cyan:#00eaff;--red:#ff3b3b}
body{margin:0;font-family:sans-serif;background:var(--bg);color:#fff}

#loginPage{display:flex;justify-content:center;align-items:center;height:100vh}
.login-box{background:#111;padding:20px;border-radius:15px;box-shadow:0 0 20px var(--green)}

input,button,select{padding:10px;border:none;border-radius:10px;margin-top:10px;width:100%}
button{background:var(--green);cursor:pointer}

#app{display:none;height:100vh;flex-direction:column}
header{display:flex;align-items:center;padding:10px;background:#111;gap:10px}
.avatar{width:40px;height:40px;border-radius:50%;background:var(--green)}
.clock{color:var(--green)}
.expire{color:var(--cyan)}
.logout{margin-left:auto;background:var(--red);padding:8px;border-radius:10px;box-shadow:0 0 10px var(--red)}
.top-btn{background:#222;color:#fff;padding:6px 10px;border-radius:8px}

.chat-box{flex:1;overflow:auto;padding:10px;display:flex;flex-direction:column}
.msg{padding:10px;margin:5px;border-radius:10px;max-width:75%;white-space:pre-wrap}
.user{align-self:flex-end;background:#222}
.ai{align-self:flex-start;background:#0f172a;color:#00ff88;text-shadow:0 0 8px #00ff88}

.input-area{display:flex;flex-direction:column;padding:10px;background:#111;gap:8px}
textarea{border-radius:20px;padding:12px;background:#222;color:#fff;border:none;width:100%;font-size:14px;line-height:1.5;resize:none}
</style></head>
<body><!-- LOGIN --><div id="loginPage">
<div class="login-box">
<h3>DeepSeeker Login</h3><select id="expiry">
<option value="1">1 Hari</option>
<option value="5">5 Hari</option>
<option value="7">7 Hari</option>
</select><input id="tokenInput" placeholder="Token user">
<button onclick="generateToken()">Generate Token</button>
<button onclick="login()">Masuk</button><hr>
<h4>API Key</h4>
<input id="apiKeyInput" placeholder="Masukkan API Key OpenRouter">
<button onclick="saveApiKey()">Simpan API Key</button><p id="generated"></p>
<p id="status"></p>
</div>
</div><!-- APP --><div id="app">
<header>
<div class="avatar"></div>
<b>DeepSeeker Multi</b>
<div class="clock" id="clock"></div>
<div class="expire" id="expire"></div>
<button class="top-btn" onclick="newChat()">+ Chat</button>
<button class="top-btn" onclick="downloadChat()">⬇ Download</button>
<button class="logout" onclick="logout()">Logout</button>
</header><div class="chat-box" id="chat"></div><div class="input-area">
<textarea id="input" placeholder="Ketik pesan... (emoji 😊 didukung)"></textarea>
<button onclick="send()">➤ Kirim</button>
</div>
</div><script>
// ===== TOKEN =====
function getTokens(){return JSON.parse(localStorage.getItem("tokens")||"{}");}
function saveTokens(t){localStorage.setItem("tokens",JSON.stringify(t));}

function generateToken(){
let tokens=getTokens();
let t="USR"+Math.random().toString(36).substring(2,8);
let days=parseInt(document.getElementById("expiry").value);
let expire=Date.now()+days*86400000;

tokens[t]={expire};
saveTokens(tokens);

document.getElementById("generated").innerText="Token: "+t;
document.getElementById("tokenInput").value=t;
}

function login(){
let t=document.getElementById("tokenInput").value.trim();
let tokens=getTokens();

if(!t){document.getElementById("status").innerText="Isi token dulu";return;}

let data=tokens[t];
if(data && data.expire>Date.now()){
localStorage.setItem("activeToken",t);
location.reload();
}else{
document.getElementById("status").innerText="Token invalid / expired";
}
}

function logout(){localStorage.removeItem("activeToken");location.reload();}

// ===== API KEY =====
function saveApiKey(){
let key=document.getElementById("apiKeyInput").value.trim();
if(!key) return alert("Isi API Key!");
localStorage.setItem("apiKey",key);
alert("API Key tersimpan!");
}
function getApiKey(){return localStorage.getItem("apiKey");}

// ===== CHAT MEMORY =====
function getChatKey(){return "chat_"+localStorage.getItem("activeToken");}
function saveChat(data){localStorage.setItem(getChatKey(),JSON.stringify(data));}
function loadChat(){return JSON.parse(localStorage.getItem(getChatKey())||"[]");}

function renderChat(){
chat.innerHTML="";
let msgs=loadChat();
msgs.forEach(m=>add(m.text,m.role,false));
}

function newChat(){
saveChat([]);
chat.innerHTML="";
}

function downloadChat(){
let data=JSON.stringify(loadChat(),null,2);
let blob=new Blob([data],{type:"application/json"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="chat.json";
a.click();
}

// AUTO LOGIN
(function(){
let t=localStorage.getItem("activeToken");
let tokens=getTokens();
if(t && tokens[t] && tokens[t].expire>Date.now()){
loginPage.style.display="none";
app.style.display="flex";
startExpire(tokens[t].expire);
renderChat();
}
})();

// CLOCK
setInterval(()=>{clock.innerText=new Date().toLocaleTimeString()},1000);

function startExpire(exp){
setInterval(()=>{
let s=Math.floor((exp-Date.now())/1000);
if(s<=0){localStorage.removeItem("activeToken");location.reload();}
let d=Math.floor(s/86400);
let h=Math.floor((s%86400)/3600);
let m=Math.floor((s%3600)/60);
expire.innerText=`${d}d ${h}h ${m}m`;
},1000);
}

// CHAT UI
function add(text,type,save=true){
let div=document.createElement("div");
div.className="msg "+type;
div.innerText=text;
chat.appendChild(div);
chat.scrollTop=999999;

if(save){
let msgs=loadChat();
msgs.push({role:type,text});
saveChat(msgs);
}

return div;
}

function streamText(el,text){
let i=0;
let int=setInterval(()=>{
if(i<text.length){el.innerText+=text[i];i++;}
else clearInterval(int);
},8);
}

// ===== AI =====
async function send(){
let apiKey=getApiKey();
if(!apiKey){alert("Masukkan API Key dulu!");return;}

let input=document.getElementById("input");
let text=input.value.trim();
if(!text)return;

add(text,"user");
input.value="";

let bubble=add("","ai");

let msgs=loadChat().map(m=>({role:m.role==="user"?"user":"assistant",content:m.text}));
msgs.unshift({role:"system",content:"AI chat untuk coding, cerita, RP, dll."});

try{
let res=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+apiKey
},
body:JSON.stringify({
model:"openai/gpt-3.5-turbo",
messages:msgs
})
});

let data=await res.json();
let reply=data?.choices?.[0]?.message?.content || "Tidak ada respon";

streamText(bubble,reply);

// simpan AI reply
let msgsSave=loadChat();
msgsSave.push({role:"ai",text:reply});
saveChat(msgsSave);

}catch{
bubble.innerText="Error koneksi";
}
}
</script></body>
</html>
