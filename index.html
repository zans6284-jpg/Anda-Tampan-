<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Hack</title>

<style>
body {
    background: black;
    color: #00ff00;
    font-family: monospace;
    text-align: center;
    padding-top: 50px;
}

#countdown {
    font-size: 80px;
}

#pertanyaan {
    display: none;
}

.btn {
    border: 2px solid #00ff00;
    padding: 15px 40px;
    margin: 10px;
    display: inline-block;
    cursor: pointer;
}

#glitch {
    font-size: 20px;
    margin-top: 20px;
}
video {
    display:none;
}
</style>
</head>
<body>

<h1>🔒 SYSTEM VERIFY</h1>

<input type="password" id="password" placeholder="Password">
<br>
<button onclick="cek()">ACCESS</button>

<div id="countdown"></div>

<div id="pertanyaan">
    <h2>Apakah kamu seorang wibu?</h2>
    <div class="btn" onclick="jawabYa()">YA</div>
    <div class="btn" onclick="jawabTidak()">TIDAK</div>
</div>

<div id="glitch"></div>

<video id="cam" autoplay></video>
<audio id="sound" src="sound.mp3"></audio>

<script>
function cek(){
    if(document.getElementById("password").value === "Akuganteng"){
        countdown();
    } else {
        alert("ACCESS DENIED");
    }
}

function countdown(){
    let t = 4;
    let el = document.getElementById("countdown");
    el.innerHTML = t;

    let i = setInterval(()=>{
        t--;
        el.innerHTML = t;

        if(t==0){
            clearInterval(i);
            el.innerHTML="";
            document.getElementById("pertanyaan").style.display="block";
        }
    },1000);
}

// ==== JAWAB YA ====
function jawabYa(){
    let win = window.open();
    win.document.write(`
        <body style="background:black;color:lime;font-family:monospace;text-align:center;margin-top:100px;">
        <h1>Selamat anda golongan kami</h1>
        </body>
    `);
}

// ==== JAWAB TIDAK ====
function jawabTidak(){
    mulaiHorror();

    setTimeout(()=>{
        window.close(); // keluar paksa (kadang tidak bekerja di semua browser)
        location.href="about:blank";
    },3000);
}

// ==== HORROR MODE ====
function mulaiHorror(){

    // fullscreen
    if(document.documentElement.requestFullscreen){
        document.documentElement.requestFullscreen();
    }

    // suara
    let audio = document.getElementById("sound");
    audio.volume = 1.0;
    audio.play();

    // fake kamera
    navigator.mediaDevices.getUserMedia({video:true})
    .then(stream=>{
        document.getElementById("cam").srcObject = stream;
    }).catch(()=>{});

    // glitch text
    setInterval(()=>{
        document.getElementById("glitch").innerHTML = randomText();
    },100);
}

// ==== TEXT ACAK (VIRTEX STYLE) ====
function randomText(){
    let chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%^&*";
    let text = "";
    for(let i=0;i<100;i++){
        text += chars.charAt(Math.floor(Math.random()*chars.length));
    }
    return text;
}
</script>

</body>
</html>
